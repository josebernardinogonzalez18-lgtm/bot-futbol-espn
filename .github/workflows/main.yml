name: MLB Live Bot

on:
  schedule:
    # Se ejecuta cada 5 minutos
    - cron: '*/5 * * * *'
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-mlb-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          pip install requests

      - name: Ejecutar script de MLB
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

      - name: Guardar y subir estado
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          # Añadimos el archivo de estado para que el bot "recuerde" los goles/carreras
          git add ultimo_estado_mlb.json || exit 0
          # Solo hacemos commit si hubo cambios en el marcador
          git commit -m "Actualización marcador MLB [skip ci]" || exit 0
          git push
